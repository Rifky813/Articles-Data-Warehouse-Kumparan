version: 2

models:
  - name: stg_articles
    description: "Staging table for raw article data from operational sources."
    columns:
      - name: article_id
        description: "The primary key of the article."
        tests:
          - unique
          - not_null
      - name: author_id
        description: "Foreign key for the author dimension."
        tests:
          - not_null

  - name: stg_deleted_articles
    description: "Staging table for article deletion logs."
    columns:
      - name: article_id
        description: "ID of the deleted article."
        tests:
          - not_null